version: '3.8'

services:
  kong-database:
    image: postgres:13
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kong-database-data:/var/lib/postgresql/data

  kong-migrations:
    image: kong:3.6.0-ubuntu
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy

  kong:
    image: kong:3.6.0-ubuntu
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    ports:
      - "80:8000"
      - "8001:8001"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
  
  api-service:
    image: ghcr.io/sparsh47/nex-api:latest
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy

  planner:
    image: ghcr.io/sparsh47/nex-worker:latest
    command: ["pnpm", "--filter", "worker", "run", "start:planner"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      redis:
        condition: service_healthy

  coder:
    image: ghcr.io/sparsh47/nex-worker:latest
    command: ["pnpm", "--filter", "worker", "run", "start:coder"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_PAT_TOKEN=${GITHUB_PAT_TOKEN}
    depends_on:
      redis:
        condition: service_healthy

  reviewer:
    image: ghcr.io/sparsh47/nex-worker:latest
    command: ["pnpm", "--filter", "worker", "run", "start:reviewer"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_PAT_TOKEN=${GITHUB_PAT_TOKEN}
    depends_on:
      redis:
        condition: service_healthy

  deployer:
    image: ghcr.io/sparsh47/nex-worker:latest
    command: ["pnpm", "--filter", "worker", "run", "start:deployer"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_PAT_TOKEN=${GITHUB_PAT_TOKEN}
      - LINEAR_API_KEY=${LINEAR_API_KEY}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  kong-database-data: